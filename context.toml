[common]
output = "context.json"
synonym_cache = ".contexting_synonyms_cache.json"
llm_model = "openai/gpt-oss-safeguard-20b"
batch_size = 0
synonyms = 4
ignore = [".git", ".venv", "site-packages", "__pycache__", "node_modules", "vendor", "dist"]
verbose = true

[init]
root = "."

[watch]
root = "."
debounce = "750ms"
llm = true
persist = "shutdown"
persist_interval = "45s"
search_log = true
search_log_query_max = 120
max_batch_size = 0

[search]
index = "context.json"
limit = 5
min_score = 1
type = "all"
dir_summary = false
dir_limit = 5
drill_limit = 3
memory = true
runtime_file = ".contexting_runtime.json"
explain = false
json = false
show_tokens = false

[eval]
index = "context.json"
cases = "eval_cases.json"
limit = 5
min_score = 1
type = "all"
explain = false
json = false
