name: Verify sitemap for Pages build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sitemap-dev
  cancel-in-progress: true

jobs:
  verify-sitemap:
    name: Build Jekyll output and verify sitemap.xml
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Verify sitemap.xml exists in the built site
        run: |
          if [ ! -f ./_site/sitemap.xml ]; then
            echo "Expected ./_site/sitemap.xml after Jekyll build."
            echo "Enable the jekyll-sitemap plugin or add a sitemap generator before deployment."
            exit 1
          fi

      - name: Upload built site for inspection
        uses: actions/upload-artifact@v4
        with:
          name: built-site-with-sitemap
          path: ./_site

# Branch protection note:
# Make this workflow a required status check on dev to prevent unverified Pages changes
# from merging and accidentally deploying.
